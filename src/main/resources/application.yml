server:
  port: 5000

spring:
  application:
    name: ollama-proxy
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: llama3 # Default fallback model

app:
  conversations:
    max-history-messages: 1000
    ttl: 24h
    naming-prompt: "Generate a concise title (max 6 words) for this conversation based on the user's first message. Respond with only the title, no quotes or punctuation."
    naming-model: "llama3.2:3b"
